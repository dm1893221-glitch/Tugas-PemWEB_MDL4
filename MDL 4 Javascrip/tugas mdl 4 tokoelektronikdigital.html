<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Toko Elektronik Cepat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
background:#f5f5f5;
}
.card-product img{
height:320px;
object-fit:cover;
}
.list-group-item{
cursor:pointer;
}
#jam{
font-weight:bold;
font-size:18px;
color:blue;
}
#output{
display:none;
}

</style>
</head>
<body>

<div class="container mt-4">
<h1 class="text-center text-primary">
Toko Elektronik Cepat
</h1>

<p class="text-center">
Waktu Transaksi :
<span id="jam"></span>
</p>

<div class="row">

<!-- Produk -->

<div class="col-md-8">
<div class="card shadow card-product">
<img id="gambarProduk" class="card-img-top">

<div class="card-body">
<h3 id="namaProduk"></h3>
<h4 class="text-danger" id="hargaProduk"></h4>

<button class="btn btn-secondary"
onclick="prevImage()">
Previous
</button>

<button class="btn btn-primary"
onclick="nextImage()">
Next
</button>

</div>
</div>
</div>

<!-- Daftar Produk -->

<div class="col-md-4">
<h4>Daftar Produk</h4>

<ul class="list-group" id="daftarProduk">

</ul>
</div>
</div>

<hr>

<h3>Form Pemesanan</h3>
<div class="row">
<div class="col-md-6">
<div class="mb-3">

<label>Nama Pemesan</label>

<input
type="text"
id="nama"
class="form-control">

</div>
<div class="mb-3">
<label>Jumlah Pesan</label>

<input
type="number"
id="jumlah"
class="form-control">

</div>
<div class="mb-3">

<label>Kode Promo</label>
<input
type="text"
id="promo"
class="form-control">

</div>
<button
class="btn btn-success"
onclick="pesan()">

Pesan Sekarang

</button>

</div>
<div class="col-md-6">
<div
class="alert alert-info"
id="output">

</div>
</div>
</div>
</div>
<script>

//======================
// DATA PRODUK
//======================

const produk=[

{

nama:"Laptop ASUS VivoBook",
harga:8500000,
gambar:[
"https://images.unsplash.com/photo-1496181133206-80ce9b88a853",
"https://images.unsplash.com/photo-1517336714739-489689fd1ca8",
"https://images.unsplash.com/photo-1518770660439-4636190af475"

]
},
{

nama:"Samsung Galaxy S25",
harga:12000000,
gambar:[

"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
"https://images.unsplash.com/photo-1598327105666-5b89351aff97",
"https://images.unsplash.com/photo-1580910051074-3eb694886505"

]
},
{

nama:"Headset Gaming",
harga:650000,
gambar:[
"https://images.unsplash.com/photo-1505740420928-5e560c06d30e",
"https://images.unsplash.com/photo-1546435770-a3e426bf472b",
"https://images.unsplash.com/photo-1484704849700-f032a568e944"

]
}
];

let produkAktif=0;
let gambarAktif=0;

//======================
// JAM
//======================

function updateJam(){
let now=new Date();

document.getElementById("jam").innerHTML=
now.toLocaleString("id-ID");

}
setInterval(updateJam,1000);
updateJam();

//======================
// TAMPIL PRODUK
//======================

function tampilProduk(){
document.getElementById("gambarProduk").src=
produk[produkAktif].gambar[gambarAktif];
document.getElementById("namaProduk").innerHTML=
produk[produkAktif].nama;

document.getElementById("hargaProduk").innerHTML=
"Rp "+produk[produkAktif].harga.toLocaleString();
}
function nextImage(){
gambarAktif++;
if(gambarAktif>=produk[produkAktif].gambar.length){
gambarAktif=0;

}
tampilProduk();
}
function prevImage(){
gambarAktif--;
if(gambarAktif<0){
gambarAktif=
produk[produkAktif].gambar.length-1;
}

tampilProduk();
}

//======================
// DAFTAR PRODUK
//======================

let daftar=document.getElementById("daftarProduk");
produk.forEach((item,index)=>{
daftar.innerHTML+=`

<li
class="list-group-item"
onclick="pilihProduk(${index})">
${item.nama}

</li>
`;
});

function pilihProduk(index){
produkAktif=index;
gambarAktif=0;
tampilProduk();
}
tampilProduk();

//======================
// PESAN
//======================

function pesan(){
let nama=
document.getElementById("nama").value;

let jumlah=
parseInt(document.getElementById("jumlah").value);
let promo=
document.getElementById("promo").value.toUpperCase();

if(nama==""){
alert("Nama wajib diisi");
return;

}
if(isNaN(jumlah) || jumlah<=0){
alert("Jumlah tidak valid");
return;
}

let subtotal=
produk[produkAktif].harga*jumlah;
let diskon=0;
if(promo=="DISKON10"){
diskon=subtotal*0.10;

}

let total=
subtotal-diskon;
let order=
"INV-"+Math.floor(Math.random()*90000+10000);
let hasil=`

<h4>Struk Pesanan</h4>
<hr>
<b>Order ID :</b> ${order}<br>
<b>Nama :</b> ${nama}<br>
<b>Produk :</b> ${produk[produkAktif].nama}<br>
<b>Jumlah :</b> ${jumlah}<br>
<b>Subtotal :</b> Rp ${subtotal.toLocaleString()}<br>
<b>Potongan :</b> Rp ${diskon.toLocaleString()}<br>
<b>Total :</b>
<span class="text-danger">

Rp ${total.toLocaleString()}
</span>

`;

document.getElementById("output").style.display="block";
document.getElementById("output").innerHTML=hasil;
}
</script>
</body>
</html>
