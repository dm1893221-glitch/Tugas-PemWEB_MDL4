<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Toko Elektronik Cepat</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="#">
                Toko Elektronik Cepat
            </a>

            <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="#">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#produk">
                            Produk
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#pesan">
                            Pemesanan
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- ================= HERO ================= -->

    <section class="hero text-center">

        <div class="container">

            <h1 class="fw-bold">
                Mini E-Commerce
            </h1>

            <p>
                Selamat Datang di Toko Elektronik Cepat
            </p>

            <h5 id="tanggal"></h5>

            <h3 id="jam"></h3>

        </div>

    </section>

    <!-- ================= PRODUK ================= -->

    <section class="container py-5" id="produk">

        <div class="row">

            <!-- Display Produk -->

            <div class="col-lg-8">

                <div class="card shadow">

                    <img
                        id="gambarProduk"
                        class="card-img-top"
                        src=""
                        height="420"
                        style="object-fit:cover;">

                    <div class="card-body">

                        <h3 id="namaProduk"></h3>

                        <h4 class="text-success"
                            id="hargaProduk"></h4>

                        <div class="mt-3">

                            <button
                                class="btn btn-primary"
                                onclick="prevImage()">

                                Previous

                            </button>

                            <button
                                class="btn btn-success"
                                onclick="nextImage()">

                                Next

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Daftar Produk -->

            <div class="col-lg-4">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h5>Daftar Produk</h5>

                    </div>

                    <ul
                        class="list-group list-group-flush"
                        id="daftarProduk">

                    </ul>

                </div>

            </div>

        </div>

    </section>

    <!-- ================= FORM ================= -->

    <section
        class="container pb-5"
        id="pesan">

        <div class="card shadow">

            <div class="card-header bg-success text-white">

                <h4>Form Pemesanan</h4>

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">

                            Nama Pemesan

                        </label>

                        <input
                            type="text"
                            id="nama"
                            class="form-control">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Jumlah Pesan

                        </label>

                        <input
                            type="number"
                            id="jumlah"
                            class="form-control">

                    </div>

                </div>

                <div class="mt-3">

                    <label class="form-label">

                        Kode Promo

                    </label>

                    <input
                        type="text"
                        id="promo"
                        class="form-control"
                        placeholder="DISKON10">

                </div>

                <div class="mt-4">

                    <button
                        class="btn btn-success"
                        onclick="pesanProduk()">

                        Pesan Sekarang

                    </button>

                </div>

            </div>

        </div>

    </section>

    <!-- ================= OUTPUT ================= -->

    <section class="container mb-5">

        <div class="card shadow">

            <div class="card-header bg-dark text-white">

                <h4>Struk Pemesanan</h4>

            </div>

            <div
                class="card-body"
                id="output">

                Belum ada transaksi.

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-dark text-white text-center p-4">

        © 2026 Toko Elektronik Cepat

    </footer>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Javascript -->

    <script src="script.js"></script>

</body>

</html>
